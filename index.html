<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Receipt Tracker — Atlantic Highlights 2026</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 20px; }
        .container { max-width: 1050px; margin: 0 auto; }
        h1 { text-align: center; color: #333; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #999; font-size: .9em; margin-bottom: 25px; }

        .summary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 22px; text-align: center; border-radius: 10px; margin-bottom: 20px; }
        .summary-amount { font-size: 2.4em; font-weight: bold; margin: 6px 0; }
        .summary-sub { font-size: .95em; opacity: .9; margin-top: 6px; }

        .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; margin-bottom: 20px; }
        .stat-box { background: white; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 2px 4px rgba(0,0,0,.08); }
        .stat-box .lbl { font-size: .82em; color: #999; margin-bottom: 4px; }
        .stat-box .val { font-size: 1.5em; font-weight: bold; color: #333; }

        .main { display: grid; grid-template-columns: 400px 1fr; gap: 20px; }
        @media(max-width:850px){ .main { grid-template-columns: 1fr; } }

        .card { background: white; border-radius: 10px; padding: 22px; box-shadow: 0 2px 6px rgba(0,0,0,.09); }
        .card h2 { font-size: 1.15em; color: #333; margin-bottom: 16px; }

        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 18px; }
        .tab-btn { flex: 1; padding: 10px; background: none; border: none; cursor: pointer; font-weight: bold; color: #999; border-bottom: 3px solid transparent; font-size: .95em; }
        .tab-btn.active { color: #ff6b6b; border-bottom-color: #ff6b6b; }
        .tab-pane { display: none; }
        .tab-pane.active { display: block; }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: .87em; font-weight: bold; color: #444; margin-bottom: 4px; }
        input[type=text], input[type=number], input[type=date], textarea, select {
            width: 100%; padding: 9px 11px; border: 1px solid #ddd; border-radius: 5px; font-size: .95em; font-family: inherit;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #ff6b6b; }
        textarea { min-height: 65px; resize: vertical; }

        .cur-btns { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 4px; }
        .cur-btn { padding: 7px 14px; border: 2px solid #ddd; background: white; border-radius: 5px; cursor: pointer; font-size: .88em; font-weight: bold; }
        .cur-btn.active { border-color: #ff6b6b; background: #fff0f0; color: #ff6b6b; }

        .btn-row { display: flex; gap: 10px; margin-top: 14px; }
        .btn-add { flex: 1; padding: 11px; background: #ff6b6b; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 1em; cursor: pointer; }
        .btn-add:hover { background: #ff5252; }
        .btn-add:disabled { background: #ffb3b3; cursor: not-allowed; }
        .btn-clear { padding: 11px 16px; background: #eee; color: #555; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .upload-box { border: 2px dashed #ff6b6b; border-radius: 8px; padding: 25px 15px; text-align: center; cursor: pointer; background: #fff8f8; margin-bottom: 12px; }
        .upload-box:hover { background: #ffecec; }
        .upload-box input { display: none; }
        #photoPreview { width: 100%; max-height: 220px; object-fit: contain; border-radius: 6px; border: 1px solid #eee; margin-bottom: 12px; display: none; }

        .ai-status { padding: 10px 13px; border-radius: 6px; font-size: .88em; margin-bottom: 12px; display: none; align-items: center; gap: 8px; }
        .ai-status.show { display: flex; }
        .ai-status.loading { background: #e8f4fd; color: #1a6c9e; border: 1px solid #bee5f7; }
        .ai-status.ok  { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .ai-status.fail{ background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        .spinner { width: 15px; height: 15px; border: 2px solid #bee5f7; border-top-color: #1a6c9e; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .ai-badge { display: inline-block; background: #28a745; color: white; font-size: .72em; padding: 1px 5px; border-radius: 3px; margin-left: 5px; vertical-align: middle; }
        .field-ok { border-color: #28a745 !important; background: #f0fff4 !important; }

        .list-top { display: flex; gap: 10px; margin-bottom: 12px; align-items: center; flex-wrap: wrap; }
        .list-top select, .list-top input { padding: 8px 10px; border: 1px solid #ddd; border-radius: 5px; font-size: .9em; }
        .list-top input { flex: 1; min-width: 100px; }

        .receipt-list { max-height: 520px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .r-card { background: #fafafa; border-left: 4px solid #ff6b6b; border-radius: 6px; padding: 11px 13px; display: flex; justify-content: space-between; gap: 10px; }
        .r-card.isk { border-left-color: #667eea; }
        .r-name { font-weight: bold; font-size: .95em; color: #222; }
        .r-meta { font-size: .82em; color: #aaa; margin-top: 2px; }
        .r-notes { font-size: .82em; color: #777; margin-top: 4px; font-style: italic; }
        .r-right { text-align: right; flex-shrink: 0; }
        .r-usd { font-size: 1.15em; font-weight: bold; color: #ff6b6b; }
        .r-orig { font-size: .8em; color: #ccc; }
        .r-del { font-size: .75em; color: #ddd; cursor: pointer; display: block; margin-top: 3px; }
        .r-del:hover { color: #ff6b6b; }
        .badge { font-size: .74em; padding: 1px 6px; border-radius: 8px; margin-left: 4px; }
        .b-eur { background: #fff0dc; color: #c07010; }
        .b-isk { background: #e8eeff; color: #4455cc; }

        .msg { padding: 10px 13px; border-radius: 6px; margin-bottom: 12px; font-size: .9em; display: none; }
        .msg.ok  { background: #d4edda; color: #155724; border-left: 3px solid #28a745; display: block; }
        .msg.err { background: #f8d7da; color: #721c24; border-left: 3px solid #dc3545; display: block; }

        .export-btn { width: 100%; margin-top: 12px; padding: 10px; background: #5a6acf; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .export-btn:hover { background: #4a5abf; }
        .reset-link { font-size: .8em; color: #ccc; background: none; border: none; cursor: pointer; float: right; }
        .reset-link:hover { color: #999; }
    </style>
</head>
<body>
<div class="container">
    <h1>💰 Receipt Tracker</h1>
    <p class="subtitle">🌊 2026 Atlantic Highlights Tour · 🇮🇸 Iceland → 🇪🇸 Tenerife</p>

    <div class="summary">
        <div style="opacity:.8;font-size:.88em;">Total Spent</div>
        <div class="summary-amount" id="grandTotal">$0.00</div>
        <div class="summary-sub">🇮🇸 <span id="icelandTotal">$0</span> &nbsp;|&nbsp; 🇪🇸 <span id="teneriffeTotal">$0</span></div>
    </div>

    <div class="stats-row">
        <div class="stat-box"><div class="lbl">Receipts</div><div class="val" id="sCount">0</div></div>
        <div class="stat-box"><div class="lbl">Average</div><div class="val" id="sAvg">$0</div></div>
        <div class="stat-box"><div class="lbl">Biggest</div><div class="val" id="sMax">$0</div></div>
    </div>

    <div class="main">
        <!-- LEFT: ADD -->
        <div class="card">
            <h2>➕ Add Receipt <button class="reset-link" onclick="resetData()">🔄 Reset all</button></h2>
            <div id="msg" class="msg"></div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('manual',this)">✏️ Manual</button>
                <button class="tab-btn" onclick="switchTab('photo',this)">📸 Photo (AI)</button>
            </div>

            <!-- MANUAL -->
            <div id="tab-manual" class="tab-pane active">
                <div class="form-group">
                    <label>Trip</label>
                    <input type="text" id="m-trip" value="2026 Atlantic Highlights Tour">
                </div>
                <div class="form-group">
                    <label>Date</label>
                    <input type="date" id="m-date">
                </div>
                <div class="form-group">
                    <label>Establishment</label>
                    <input type="text" id="m-name" placeholder="Restaurant or shop name">
                </div>
                <div class="form-group">
                    <label>Currency</label>
                    <div class="cur-btns">
                        <button class="cur-btn active" onclick="setMCur('EUR',this)">€ EUR</button>
                        <button class="cur-btn" onclick="setMCur('ISK',this)">kr ISK</button>
                        <button class="cur-btn" onclick="setMCur('USD',this)">$ USD</button>
                    </div>
                    <input type="hidden" id="m-cur" value="EUR">
                </div>
                <div class="form-group">
                    <label>Amount</label>
                    <input type="number" id="m-amount" step="0.01" placeholder="0.00">
                </div>
                <div class="form-group">
                    <label>Exchange Rate (to USD)</label>
                    <input type="number" id="m-rate" step="0.0001" value="1.1748">
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea id="m-notes" placeholder="What was this for?"></textarea>
                </div>
                <div class="btn-row">
                    <button class="btn-add" onclick="addManual()">Add Receipt</button>
                    <button class="btn-clear" onclick="clearManual()">Clear</button>
                </div>
            </div>

            <!-- PHOTO -->
            <div id="tab-photo" class="tab-pane">
                <div class="upload-box" onclick="document.getElementById('photoInput').click()">
                    <div style="font-size:2em;margin-bottom:6px;">📸</div>
                    <div style="font-weight:bold;color:#555;">Tap to upload receipt photo</div>
                    <div style="font-size:.85em;color:#aaa;margin-top:4px;">JPG · PNG · HEIC · WebP</div>
                    <input type="file" id="photoInput" accept="image/*" onchange="onPhotoSelected(event)">
                </div>
                <img id="photoPreview" alt="Receipt">
                <div id="aiStatus" class="ai-status"></div>

                <div class="form-group">
                    <label>Trip</label>
                    <input type="text" id="p-trip" value="2026 Atlantic Highlights Tour">
                </div>
                <div class="form-group">
                    <label>Date <span id="b-date"></span></label>
                    <input type="date" id="p-date">
                </div>
                <div class="form-group">
                    <label>Establishment <span id="b-name"></span></label>
                    <input type="text" id="p-name" placeholder="Filled from photo...">
                </div>
                <div class="form-group">
                    <label>Amount <span id="b-amount"></span></label>
                    <input type="number" id="p-amount" step="0.01" placeholder="Filled from photo...">
                </div>
                <div class="form-group">
                    <label>Currency <span id="b-cur"></span></label>
                    <div class="cur-btns">
                        <button class="cur-btn active" id="pc-EUR" onclick="setPCur('EUR',this)">€ EUR</button>
                        <button class="cur-btn" id="pc-ISK" onclick="setPCur('ISK',this)">kr ISK</button>
                        <button class="cur-btn" id="pc-USD" onclick="setPCur('USD',this)">$ USD</button>
                    </div>
                    <input type="hidden" id="p-cur" value="EUR">
                </div>
                <div class="form-group">
                    <label>Exchange Rate</label>
                    <input type="number" id="p-rate" step="0.0001" value="1.1748">
                </div>
                <div class="form-group">
                    <label>Notes <span id="b-notes"></span></label>
                    <textarea id="p-notes" placeholder="Filled from photo..."></textarea>
                </div>
                <div class="btn-row">
                    <button class="btn-add" id="p-addBtn" onclick="addPhoto()">Add Receipt</button>
                    <button class="btn-clear" onclick="clearPhoto()">Clear</button>
                </div>
            </div>
        </div>

        <!-- RIGHT: LIST -->
        <div class="card">
            <h2>📋 All Receipts</h2>
            <div class="list-top">
                <select onchange="applyFilter(this.value)">
                    <option value="">All</option>
                    <option value="ISK">🇮🇸 Iceland</option>
                    <option value="EUR">🇪🇸 Tenerife</option>
                </select>
                <input type="text" placeholder="Search..." oninput="applySearch(this.value)">
            </div>
            <div class="receipt-list" id="receiptList"></div>
            <button class="export-btn" onclick="exportCSV()">📥 Export CSV</button>
        </div>
    </div>
</div>

<script>
const RATES = { EUR: 1.1748, ISK: 0.00814, USD: 1.0 };
const KEY   = 'receipts_atl2026';
const TRIP  = '2026 Atlantic Highlights Tour';

// This gets replaced with your Netlify URL after deployment
const API_ENDPOINT = 'https://statuesque-haupia-251a78.netlify.app/.netlify/functions/read-receipt';

const SEED = [
    {trip:TRIP,date:"2024-06-05",name:"Sky Lagoon",currency:"ISK",amount:13240,rate:0.00814,notes:"Geothermal spa & restaurant, Reykjavik"},
    {trip:TRIP,date:"2026-05-06",name:"Kol Restaurant",currency:"ISK",amount:19540,rate:0.00814,notes:"Fine dining – cocktails, appetizers, wine"},
    {trip:TRIP,date:"2026-05-06",name:"Dimon11",currency:"ISK",amount:15080,rate:0.00814,notes:"Restaurant – lamb, fish, wine"},
    {trip:TRIP,date:"2026-05-06",name:"Kvittun Korthafa SALA",currency:"ISK",amount:2400,rate:0.00814,notes:"Bar, Reykjavik"},
    {trip:TRIP,date:"2026-05-07",name:"Lava Centre",currency:"ISK",amount:10400,rate:0.00814,notes:"Volcano museum, Hvolsvelli"},
    {trip:TRIP,date:"2026-05-07",name:"Eldstó Art Café",currency:"ISK",amount:10940,rate:0.00814,notes:"Café – fish soup, salad, wine"},
    {trip:TRIP,date:"2026-05-07",name:"Hótel Geysir",currency:"ISK",amount:1900,rate:0.00814,notes:"Hotel bar, Selfoss"},
    {trip:TRIP,date:"2026-05-07",name:"Messinn",currency:"ISK",amount:27590,rate:0.00814,notes:"Restaurant – seafood dinners"},
    {trip:TRIP,date:"2026-05-07",name:"Apotek Kitchen + Bar",currency:"ISK",amount:7180,rate:0.00814,notes:"Restaurant – drinks"},
    {trip:TRIP,date:"2026-05-06",name:"Hotel Reykjavik Saga",currency:"ISK",amount:12771,rate:0.00814,notes:"Hotel – 2 nights + drinks & snacks"},
    {trip:TRIP,date:"2026-05-08",name:"ELDA Restaurant",currency:"ISK",amount:5880,rate:0.00814,notes:"Café – eggs benedict, sandwich, coffee"},
    {trip:TRIP,date:"2026-05-08",name:"El Mirador de la Marina",currency:"EUR",amount:132.4,rate:1.1748,notes:"Seafood dinner, Los Abrigos"},
    {trip:TRIP,date:"2026-05-09",name:"El Rincón del Pescador",currency:"EUR",amount:40.34,rate:1.1748,notes:"Seafood & wine, Las Américas"},
    {trip:TRIP,date:"2026-05-09",name:"Mare Nostrum Resort",currency:"EUR",amount:19,rate:1.1748,notes:"Resort bar – mojitos"},
    {trip:TRIP,date:"2026-05-09",name:"Cajasiete BE NATURE",currency:"EUR",amount:37,rate:1.1748,notes:"Wellness/spa"},
    {trip:TRIP,date:"2026-05-09",name:"Delicious World",currency:"EUR",amount:10.5,rate:1.1748,notes:"Drinks & snacks"},
    {trip:TRIP,date:"2026-05-09",name:"Piccolo Sama",currency:"EUR",amount:16,rate:1.1748,notes:"Restaurant, Los Cristianos"},
    {trip:TRIP,date:"2026-05-09",name:"Zanzibar Golf del Sur",currency:"EUR",amount:123,rate:1.1748,notes:"Seafood & tapas dinner"},
    {trip:TRIP,date:"2026-05-10",name:"Harbor Club Pool Bar",currency:"EUR",amount:34.15,rate:1.1748,notes:"Pool bar"},
    {trip:TRIP,date:"2026-05-10",name:"Restaurante La Fuente",currency:"EUR",amount:17,rate:1.1748,notes:"Wine, bread, Masca"},
    {trip:TRIP,date:"2026-05-10",name:"Sakura Japanese Restaurant",currency:"EUR",amount:53.2,rate:1.1748,notes:"2 menu dinners"},
    {trip:TRIP,date:"2026-05-11",name:"Zacary's",currency:"EUR",amount:12.1,rate:1.1748,notes:"Papas, beer, cider – 11:04 AM"},
    {trip:TRIP,date:"2026-05-11",name:"Zacary's",currency:"EUR",amount:36.2,rate:1.1748,notes:"Beer, cider, baguette, ham – 11:55 AM"},
    {trip:TRIP,date:"2026-05-11",name:"Grandee O'Donnell",currency:"EUR",amount:61.9,rate:1.1748,notes:"Kilkenny, Guinness, chicken salad, cheeseburger"},
    {trip:TRIP,date:"2026-05-12",name:"Cafetería 1 – Mount Teide",currency:"EUR",amount:12.7,rate:1.1748,notes:"Lunch at Mount Teide – Fonteide, chicken sandwich"},
    {trip:TRIP,date:"2026-05-12",name:"Restaurant P",currency:"EUR",amount:10.5,rate:1.1748,notes:"Mount Teide – red wine, white wine, tarta bien me sabe"},
    {trip:TRIP,date:"2026-05-12",name:"Moisés Camacho Fumero",currency:"EUR",amount:50.7,rate:1.1748,notes:"Dinner – chickpea stew was awesome! Need that recipe."}
];

let receipts = JSON.parse(localStorage.getItem(KEY)) || SEED;
if (!receipts.length) { receipts = [...SEED]; save(); }
let filterCur = '', filterSearch = '';

window.onload = () => {
    document.getElementById('m-date').valueAsDate = new Date();
    document.getElementById('p-date').valueAsDate = new Date();
    render();
};

async function onPhotoSelected(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async ev => {
        const img = document.getElementById('photoPreview');
        img.src = ev.target.result;
        img.style.display = 'block';
        await readWithAI(ev.target.result);
    };
    reader.readAsDataURL(file);
}

async function readWithAI(dataUrl) {
    setStatus('loading', 'Reading receipt with Claude AI...');
    document.getElementById('p-addBtn').disabled = true;

    const base64   = dataUrl.split(',')[1];
    const mimeType = dataUrl.split(';')[0].split(':')[1];

    try {
        const res = await fetch(API_ENDPOINT, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                messages: [{
                    role: 'user',
                    content: [
                        { type: 'image', source: { type: 'base64', media_type: mimeType, data: base64 } },
                        { type: 'text', text: 'Read this receipt. Reply with ONLY a raw JSON object, no markdown:\n{"name":"establishment","date":"YYYY-MM-DD","amount":0.00,"currency":"EUR","notes":"brief item summary"}\nRules: currency must be EUR, ISK, or USD. Amount = final total paid.' }
                    ]
                }]
            })
        });

        

        const responseText = await res.text(); if (!res.ok) throw new Error('HTTP ' + res.status + ': ' + responseText.substring(0,200)); const data = JSON.parse(responseText); if (data.error) throw new Error(data.error);
        const text = data.content?.[0]?.text?.trim().replace(/```json|```/g,'') || '';
        const x = JSON.parse(text);

        if (x.name)     { fill('p-name',   x.name);   badge('b-name'); }
        if (x.date)     { fill('p-date',   x.date);   badge('b-date'); }
        if (x.amount)   { fill('p-amount', x.amount); badge('b-amount'); }
        if (x.notes)    { fill('p-notes',  x.notes);  badge('b-notes'); }
        if (x.currency) { setPCurDirect(x.currency);  badge('b-cur'); }

        setStatus('ok', '✅ Receipt read! Review and tap Add Receipt.');
    } catch (err) {
        setStatus('fail', '⚠️ ' + err.message + ' — fill in manually below.');
    }
    document.getElementById('p-addBtn').disabled = false;
}

function fill(id, val) { const el = document.getElementById(id); el.value = val; el.classList.add('field-ok'); }
function badge(id) { document.getElementById(id).innerHTML = '<span class="ai-badge">✓ AI</span>'; }
function setStatus(type, msg) {
    const el = document.getElementById('aiStatus');
    el.className = 'ai-status show ' + type;
    el.innerHTML = (type==='loading' ? '<div class="spinner"></div>' : '') + msg;
}

function switchTab(name, btn) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+name).classList.add('active');
    btn.classList.add('active');
}
function setMCur(c,btn) {
    document.getElementById('m-cur').value = c;
    document.querySelectorAll('#tab-manual .cur-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('m-rate').value = RATES[c];
}
function setPCur(c,btn) {
    document.getElementById('p-cur').value = c;
    document.querySelectorAll('#tab-photo .cur-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('p-rate').value = RATES[c];
}
function setPCurDirect(c) {
    document.getElementById('p-cur').value = c;
    document.querySelectorAll('#tab-photo .cur-btn').forEach(b=>b.classList.remove('active'));
    const btn = document.getElementById('pc-'+c);
    if (btn) btn.classList.add('active');
    document.getElementById('p-rate').value = RATES[c] || 1;
}

function addManual() {
    const r = {
        trip: document.getElementById('m-trip').value.trim(),
        date: document.getElementById('m-date').value,
        name: document.getElementById('m-name').value.trim(),
        currency: document.getElementById('m-cur').value,
        amount: parseFloat(document.getElementById('m-amount').value),
        rate: parseFloat(document.getElementById('m-rate').value),
        notes: document.getElementById('m-notes').value.trim()
    };
    if (!r.date || !r.name || !r.amount) { showMsg('Fill Date, Establishment and Amount.','err'); return; }
    push(r); showMsg('✅ Receipt added!','ok'); clearManual();
}
function addPhoto() {
    const r = {
        trip: document.getElementById('p-trip').value.trim(),
        date: document.getElementById('p-date').value,
        name: document.getElementById('p-name').value.trim(),
        currency: document.getElementById('p-cur').value,
        amount: parseFloat(document.getElementById('p-amount').value),
        rate: parseFloat(document.getElementById('p-rate').value),
        notes: document.getElementById('p-notes').value.trim()
    };
    if (!r.date || !r.name || !r.amount) { showMsg('Fill Date, Establishment and Amount.','err'); return; }
    push(r); showMsg('✅ Receipt added!','ok'); clearPhoto();
}
function push(r) { receipts.push(r); save(); render(); }
function save()  { localStorage.setItem(KEY, JSON.stringify(receipts)); }

function clearManual() {
    document.getElementById('m-date').valueAsDate = new Date();
    ['m-name','m-amount','m-notes'].forEach(id => document.getElementById(id).value='');
}
function clearPhoto() {
    document.getElementById('p-date').valueAsDate = new Date();
    ['p-name','p-amount','p-notes'].forEach(id => { const el=document.getElementById(id); el.value=''; el.classList.remove('field-ok'); });
    document.getElementById('photoInput').value='';
    document.getElementById('photoPreview').style.display='none';
    document.getElementById('aiStatus').className='ai-status';
    ['b-date','b-name','b-amount','b-cur','b-notes'].forEach(id => document.getElementById(id).innerHTML='');
}
function deleteReceipt(i) {
    if (!confirm('Delete?')) return;
    receipts.splice(i,1); save(); render();
}
function resetData() {
    if (!confirm('Reset to original 27 receipts?')) return;
    receipts=[...SEED]; save(); render(); showMsg('Reset done.','ok');
}
function applyFilter(v) { filterCur=v; render(); }
function applySearch(v) { filterSearch=v.toLowerCase(); render(); }

function usd(r) { return r.amount*r.rate; }
function fmt(n) { return '$'+n.toFixed(2); }

function render() {
    const total    = receipts.reduce((s,r)=>s+usd(r),0);
    const iceland  = receipts.filter(r=>r.currency==='ISK').reduce((s,r)=>s+usd(r),0);
    const tenerife = receipts.filter(r=>r.currency==='EUR').reduce((s,r)=>s+usd(r),0);
    const max      = receipts.length ? Math.max(...receipts.map(r=>usd(r))) : 0;

    document.getElementById('grandTotal').textContent     = fmt(total);
    document.getElementById('icelandTotal').textContent   = fmt(iceland);
    document.getElementById('teneriffeTotal').textContent = fmt(tenerife);
    document.getElementById('sCount').textContent         = receipts.length;
    document.getElementById('sAvg').textContent           = fmt(total/Math.max(receipts.length,1));
    document.getElementById('sMax').textContent           = fmt(max);

    const list = receipts.filter(r => {
        if (filterCur && r.currency!==filterCur) return false;
        if (filterSearch && !r.name.toLowerCase().includes(filterSearch) && !(r.notes||'').toLowerCase().includes(filterSearch)) return false;
        return true;
    });

    document.getElementById('receiptList').innerHTML = list.length
        ? list.slice().reverse().map(r => {
            const i=receipts.indexOf(r), u=usd(r).toFixed(2), isk=r.currency==='ISK';
            return `<div class="r-card ${isk?'isk':''}">
                <div style="flex:1">
                    <div class="r-name">${r.name} <span class="badge ${isk?'b-isk':'b-eur'}">${isk?'🇮🇸 ISK':'🇪🇸 EUR'}</span></div>
                    <div class="r-meta">${r.date} · ${r.currency} ${r.amount.toLocaleString()}</div>
                    ${r.notes?`<div class="r-notes">${r.notes}</div>`:''}
                </div>
                <div class="r-right">
                    <div class="r-usd">$${u}</div>
                    <div class="r-orig">${r.currency} ${r.amount}</div>
                    <span class="r-del" onclick="deleteReceipt(${i})">✕ delete</span>
                </div>
            </div>`;
          }).join('')
        : '<div style="text-align:center;padding:40px;color:#bbb;">No receipts match.</div>';
}

function exportCSV() {
    let csv='Date,Name,Currency,Amount,Rate,USD,Notes,Trip\n';
    receipts.forEach(r => { csv+=`${r.date},"${r.name}",${r.currency},${r.amount},${r.rate},${usd(r).toFixed(2)},"${r.notes||''}","${r.trip||''}"\n`; });
    const a=document.createElement('a');
    a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
    a.download='receipts_atlantic_2026.csv';
    a.click();
}
function showMsg(text,type) {
    const el=document.getElementById('msg');
    el.className='msg '+type; el.textContent=text;
    setTimeout(()=>el.className='msg',3000);
}
</script>
